name: media_compress_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' # KOREKSI VITAL: Menaikkan limit SDK agar kompatibel dengan Firebase & FFmpeg modern

dependencies:
  flutter:
    sdk: flutter

  # Utilitas Dasar & Perizinan
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.5
  device_info_plus: ^10.0.0
  url_launcher: ^6.3.0
  permission_handler: ^12.0.1

  # Media Selektor & Galeri
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  gal: ^2.3.0
  share_plus: ^10.0.0

  # Mesin Kompresor Inti
  flutter_image_compress: ^2.1.0
  video_compress: ^3.1.2
  video_player: ^2.5.0
  syncfusion_flutter_pdf: ^25.2.4
  

  # Google AdMob & Firebase
  google_mobile_ads: ^5.0.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0 # KOREKSI: Mengeluarkan lints ke posisi dev_dependencies yang benar

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#EFF6FF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/